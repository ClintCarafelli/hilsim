#----------------------------------------------------------------
#                        INTRODUCTION
#----------------------------------------------------------------
title = "Artemis Gardens" 

[author]
primary_author = "Clint Carafelli"

# Sections: 
#    - sensor parameters
#    - timing
#    - alarm system
#    - data handling parameters
#    - RP2040 patameters (controls)
#    - Email parameters
#    - log file managment

#----------------------------------------------------------------
#                      SENSOR PARAMETERS
#----------------------------------------------------------------

[sensor_params]
# enabled sensored contains the sensor_ids
enabled_sensors = ["STEMMA1", "STEMMA2", "STEMMA3","SCD30", "BMP388", "ME2", "INA260"]
sim_all         = "True"

# Number describes how many subsequent erroneous readings are needed
# to trigger the recovery method
[sensor_error_program]
first_i2c_cycle    = 4 
second_i2c_cycle   = 5 
first_power_cycle  = 6 
second_power_cycle = 7 
dead               = 8

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
# Soil sensor configurations
[sensors.STEMMA1]
description             = "Reads a unitless soil moisture value and chip temperature (not soil temp)"
num_measurements        = 2
i2c_address             = "0x36"
driver                  = "STEMMA1_driver"
sim                     = "TRUE"
failure_rate            = 0.1
sim_fail_initialization = false

[[sensors.STEMMA1.readings]]
name     = "soil_moisture"
units    = "None"
max      = 2000
min      = 200
noise    = 0.5
drift    = 0.1

[[sensors.STEMMA1.readings]]
name     = "stemma_chip_temp"
units    = "C"
max      = 85
min      = -40
noise    = 0.5
drift    = 0.1

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
[sensors.STEMMA2]
description             = "Reads a unitless soil moisture value and chip temperature (not soil temp)"
num_measurements        = 2
sensor_num              = 1
i2c_address             = "0x37"
driver                  = "STEMMA2_driver"
sim                     = "TRUE"
failure_rate            = 0.1
sim_fail_initialization = false

[[sensors.STEMMA2.readings]]
name     = "soil_moisture"
units    = "None"
max      = 2000
min      = 200
noise    = 0.1
drift    = 0.1

[[sensors.STEMMA2.readings]]
name     = "stemma_chip_temp"
units    = "C"
max      = 85
min      = -40
noise    = 0.5
drift    = 0.1

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
[sensors.STEMMA3]
description             = "Reads a unitless soil moisture value and chip temperature (not soil temp)"
num_measurements        = 2
i2c_address             = "0x38"
driver                  = "STEMMA3_driver"
sim                     = "TRUE"
failure_rate            = 0.1
sim_fail_initialization = false 

[[sensors.STEMMA3.readings]]
name     = "soil_moisture"
units    = "None"
max      = 2000
min      = 200
noise    = 0.1
drift    = 0.1

[[sensors.STEMMA3.readings]]
name     = "stemma_chip_temp"
units    = "C"
max      = 85
min      = -40
noise    = 0.5
drift    = 0.1

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
# CO2 sensor configurations
[sensors.SCD30]
description = "Measures CO2 (ppm), relative humdity (%), and temperature (C)"
num_measurements        = 3
driver                  = "SCD30_driver"
sim                     = "True"
failure_rate            = 0.1
sim_fail_initialization = false


[[sensors.SCD30.readings]]
name     = "CO2"
units    = "ppm"
min      = 0
max      = 40000
noise    = 0.1
drift    = 0.1

[[sensors.SCD30.readings]]
name     = "relative_humidity"
units    = "percent"
min      = 0
max      = 95
noise    = 0.1
drift    = 0.1

[[sensors.SCD30.readings]]
name     = "system_temp"
units    = "C"
min      = 0
max      = 50
accuracy = 0.4
noise    = 0.1
drift    = 0.1

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
# Pressure sensor configurations
[sensors.BMP388]
description             = "measures pressure (hpa) and air temp (C)"
num_measurements        = 2
driver                  = "BMP388_driver"
sim                     = "True"
failure_rate            = 0.1
sim_fail_initialization = false

[[sensors.BMP388.readings]]
name     = "system_pressure"
units    = "hpa"
min      = 300
max      = 1250
noise    = 0.1
drift    = 0.1

[[sensors.BMP388.readings]]
name     = "system_temp"
units    = "C"
min      = 0
max      = 65
noise    = 0.1
drift    = 0.1

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
# Oxygen Sensor configurations
[sensors.ME2]
description             = "measures oxygen (% of air mass)"
num_measurements        = 1
collection_number       = 10
IIC_mode                = 0x01
i2c_address             = 0x73
driver                  = "ME2_driver"
sim                     = "True"
failure_rate            = 0.1
sim_fail_initialization = false

[[sensors.ME2.readings]]
name     = "O2"
units    = "percent"
min      = 0
max      = 25
noise    = 0.1
drift    = 0.1

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
# Power sensor configurations
[sensors.INA260]
description             = "measures voltage (V), current (mA), and power (mW) using a shunt resistor"
num_measurements        = 3
driver                  = "INA260_driver" 
sim                     = "True"
failure_rate            = 0.1
sim_fail_initialization = false

[[sensors.INA260.readings]]
name     = "system_voltage"
units    = "V"
min      = 0
max      = 40
noise    = 0.005
drift    = 0.1

[[sensors.INA260.readings]]
name     = "system_current"
units    = "mA"
min      = 0
max      = 15000
noise    = 0.1
drift    = 0.5

[[sensors.INA260.readings]]
name     = "system_power"
units    = "mW"
min      = 0
max      = 600000
noise    = 0.0005
drift    = 0.01

#----------------------------------------------------------------
#                            TIMING
#----------------------------------------------------------------
[timing]
# Sensor reading rate (seconds, float)
sensor_reading_rate = 2

# File times (hours, integer)
file_time           = 4

# number of flash attempts for lights
max_flash_attempts  = 5

#----------------------------------------------------------------
#                          ALARM SYSTEM
#----------------------------------------------------------------
[alarms]
# Oxygen Alarm
ME2_warning_threshold = 22
ME2_alarm_threshold   = 23.5
ME2_mvl               = 50


#----------------------------------------------------------------
#                    DATA HANDLING PARAMETERS
#----------------------------------------------------------------
[paths]
# Data paths
save_data_dir       = "FinalIntegrationData"
comms_data_dir      = "CommsFinal"
comms_data_name     = "test_data.csv"
comms_image_name    = "camera1.jpg"
white_light_script  = "WhiteLights.sh"
purple_light_script = "PurpleLights.sh"
take_picture_script = "take_picture.sh"

#----------------------------------------------------------------
#                 RP2040 PARAMETERS (controls)
#----------------------------------------------------------------
[controls]
# CO2 channel
CO2_channel        = 5

# Servo Channel 
servo_channel      = 7
servo_up_clicks    = 1100
servo_down_clicks  = 500

# General PWM settings
PWM_100_clicks     = 20000
PWM_0_clicks       = 0 

# CO2 control (ppm)
CO2_too_low        = 200

# Humidity Control (percent)
humidity_too_high  = 90
humidity_too_low   = 50

# Initial Servo Setting (closed):
init_servo_setting = 500

#----------------------------------------------------------------
#                      EMAIL PARAMETERS
#----------------------------------------------------------------
[email]
#----------------------------------------------------------------
#                     LOG FILE MANAGMENT
#----------------------------------------------------------------
[logging]
log_file_dir = "FinalIntegrationData"

#----------------------------------------------------------------
